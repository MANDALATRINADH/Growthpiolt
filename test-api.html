<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowthPilot API Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .status-online {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-offline {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        h3 {
            margin-top: 0;
            color: #667eea;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #5a67d8;
        }
        pre {
            background: #2d3748;
            color: #68d391;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 15px;
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 GrowthPilot API Test</h1>
        <div id="serverStatus" class="status status-offline">
            🔌 Checking server connection...
        </div>
        
        <div class="section">
            <h3>🏥 Health Check</h3>
            <button onclick="testHealth()">Check Server Health</button>
            <pre id="healthResult">Click button to test...</pre>
        </div>
        
        <div class="section">
            <h3>📝 Register User</h3>
            <input type="text" id="regName" placeholder="Full Name" value="John Doe">
            <input type="email" id="regEmail" placeholder="Email" value="john@example.com">
            <input type="password" id="regPassword" placeholder="Password" value="123456">
            <button onclick="testRegister()">Register</button>
            <pre id="registerResult">Click button to test...</pre>
        </div>
        
        <div class="section">
            <h3>🔐 Login</h3>
            <input type="email" id="loginEmail" placeholder="Email" value="john@example.com">
            <input type="password" id="loginPassword" placeholder="Password" value="123456">
            <button onclick="testLogin()">Login</button>
            <pre id="loginResult">Click button to test...</pre>
        </div>
        
        <div class="section">
            <h3>📊 API Info</h3>
            <p><strong>API URL:</strong> <span id="apiUrl">http://localhost:5000/api</span></p>
            <p><strong>Status:</strong> <span id="apiStatus">Unknown</span></p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Check server status on page load
        async function checkServerStatus() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                const statusDiv = document.getElementById('serverStatus');
                statusDiv.className = 'status status-online';
                statusDiv.innerHTML = '✅ Server is ONLINE! Connected to MongoDB';
                document.getElementById('apiStatus').innerHTML = '<span class="success">● Online</span>';
            } catch (error) {
                const statusDiv = document.getElementById('serverStatus');
                statusDiv.className = 'status status-offline';
                statusDiv.innerHTML = '❌ Server is OFFLINE! Make sure backend is running on port 5000';
                document.getElementById('apiStatus').innerHTML = '<span class="error">● Offline</span>';
                console.error('Server not reachable:', error);
            }
        }
        
        async function testHealth() {
            const resultDiv = document.getElementById('healthResult');
            resultDiv.textContent = 'Testing...';
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message + '\n\nMake sure backend is running on port 5000';
            }
        }
        
        async function testRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            const resultDiv = document.getElementById('registerResult');
            resultDiv.textContent = 'Registering...';
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
                
                if (response.ok) {
                    alert('✅ Registration successful!');
                } else {
                    alert('❌ Registration failed: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
                alert('❌ Error: ' + error.message);
            }
        }
        
        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const resultDiv = document.getElementById('loginResult');
            resultDiv.textContent = 'Logging in...';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
                
                if (response.ok) {
                    alert('✅ Login successful!');
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                        console.log('Token saved:', data.token);
                    }
                } else {
                    alert('❌ Login failed: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
                alert('❌ Error: ' + error.message);
            }
        }
        
        // Display API URL
        document.getElementById('apiUrl').textContent = API_URL;
        
        // Check server status when page loads
        checkServerStatus();
        
        // Auto-refresh server status every 10 seconds
        setInterval(checkServerStatus, 10000);
    </script>
</body>
</html>
